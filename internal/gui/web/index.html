<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>mykeep — portable memory</title>
<style>
  /* Clean-technical theme — system fonts only, so the GUI renders identically offline
     with zero embedded font assets and no network call. */
  :root{
    --bg:#0a0a0b; --panel:#121214; --panel-2:#161619;
    --line:rgba(255,255,255,.09); --line-2:rgba(255,255,255,.16);
    --text:#ededf0; --muted:#9a9aa4; --faint:#6b6b75;
    --accent:#5e9eff; --accent-soft:rgba(94,158,255,.14); --accent-line:rgba(94,158,255,.4);
    --ship:#46c266; --err:#ff7a6b;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
    color-scheme:dark;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; display:flex; justify-content:center;
    background:var(--bg); color:var(--text);
    font:15px/1.6 var(--sans); -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:radial-gradient(80% 50% at 50% -10%,rgba(94,158,255,.07),transparent 70%);}
  ::selection{background:var(--accent-soft);}
  .wrap{width:100%; max-width:680px; padding:40px 22px 72px;}
  .topbar{display:flex; justify-content:space-between; align-items:center; gap:16px;}
  h1{display:inline-flex;align-items:center;gap:10px;font-family:var(--mono);font-weight:600;font-size:18px;letter-spacing:-.01em;margin:0;color:var(--text);}
  h1 .sq{width:24px;height:24px;border-radius:7px;border:1px solid var(--accent-line);background:var(--accent-soft);display:grid;place-items:center;font-size:.86rem;color:var(--text);}
  h1 .key{color:var(--accent);}
  .sub{color:var(--muted); margin:9px 0 0; font-size:14px;}
  .rule{height:1px; margin:22px 0 24px; background:var(--line);}
  .card{position:relative; background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:20px 22px; margin-bottom:16px;}
  .card h2{font-family:var(--mono); font-size:11.5px; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); font-weight:500; margin:0 0 16px;}
  input[type=password], input[type=text], textarea{width:100%; background:var(--bg); border:1px solid var(--line); color:var(--text); border-radius:8px; padding:11px 12px; font:inherit; outline:none; transition:border-color .18s;}
  input::placeholder, textarea::placeholder{color:var(--faint);}
  input:focus, textarea:focus{border-color:var(--accent-line);}
  textarea{resize:vertical; min-height:64px;}
  button{font-family:var(--sans); font-size:13px; font-weight:550; background:var(--accent); color:#06121f; border:1px solid var(--accent); border-radius:8px; padding:11px 18px; cursor:pointer; transition:.18s ease;}
  button:hover{filter:brightness(1.06); transform:translateY(-1px);}
  button.ghost{background:var(--panel); color:var(--text); border:1px solid var(--line-2);}
  button.ghost:hover{border-color:var(--accent-line); background:var(--accent-soft); transform:translateY(-1px); filter:none;}
  button:disabled{opacity:.5; cursor:default; transform:none; filter:none;}
  .row{display:flex; gap:11px; align-items:center;}
  .row > input, .row > textarea{flex:1;}
  .err{color:var(--err); font-size:13.5px; min-height:18px; margin-top:10px;}
  .muted{color:var(--muted); font-size:14px;}
  pre.snippet{white-space:pre-wrap; word-break:break-word; background:var(--bg); border:1px solid var(--line); border-radius:8px; padding:15px; font:12.5px/1.7 var(--mono); margin:0; color:var(--muted);}
  .stat{display:flex; gap:34px; flex-wrap:wrap;}
  .stat div b{font-family:var(--mono); display:block; font-size:22px; color:var(--text); font-weight:600;}
  .stat div span{color:var(--faint); font-size:11px; text-transform:uppercase; letter-spacing:.1em;}
  .hidden{display:none;}
  .result{border-top:1px solid var(--line); padding:12px 0;}
  .result:first-child{border-top:0;}
  .result .tags{color:var(--accent); font-size:13px; margin-top:3px; font-family:var(--mono);}
  .pill{font-family:var(--mono); font-size:10.5px; letter-spacing:.04em; color:var(--muted); border:1px solid var(--line); background:var(--panel); padding:5px 11px; border-radius:999px; white-space:nowrap; display:inline-flex; align-items:center; gap:7px;}
  .pill .d{width:6px;height:6px;border-radius:50%;background:var(--ship);}
  .spin{display:inline-block; width:13px; height:13px; border:2px solid rgba(255,255,255,.16); border-top-color:var(--accent); border-radius:50%; animation:s .7s linear infinite; vertical-align:-2px;}
  @keyframes s{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <h1><span class="sq">m</span>my<span class="key">keep</span></h1>
      <p class="sub" id="subtitle">portable, encrypted memory for your AI agent</p>
    </div>
    <span class="pill" id="encpill"><span class="d"></span>encrypted</span>
  </div>

  <div class="rule"></div>

  <!-- LOCK / SETUP -->
  <div class="card" id="lockCard">
    <h2 id="lockTitle">Unlock</h2>
    <p class="muted" id="lockHint"></p>
    <div style="margin:6px 0 0">
      <input type="password" id="pw" placeholder="Decryption password" autofocus>
      <input type="password" id="pw2" class="hidden" placeholder="Confirm password" style="margin-top:10px">
    </div>
    <div class="row" style="margin-top:12px">
      <button id="unlockBtn">Unlock</button>
      <span class="muted" id="lockBusy"></span>
    </div>
    <div class="err" id="lockErr"></div>
  </div>

  <!-- DASHBOARD -->
  <div id="dash" class="hidden">
    <div class="card">
      <h2>Status</h2>
      <div class="stat">
        <div><b id="memCount">–</b><span>memories</span></div>
        <div><b id="dbSize">–</b><span>on disk</span></div>
        <div><b id="embedder" style="font-size:14px">–</b><span>embedder</span></div>
      </div>
      <div class="row" style="margin-top:16px">
        <button class="ghost" id="lockNow">Lock</button>
        <span class="muted" id="warn"></span>
      </div>
    </div>

    <div class="card">
      <h2>Connect your AI assistant</h2>
      <p class="muted" style="margin:-6px 0 12px">Paste this into Claude Code, Cursor, or any agent with a shell/fetch tool.</p>
      <pre class="snippet" id="snippet">…</pre>
      <div class="row" style="margin-top:12px">
        <button class="ghost" id="copyBtn">Copy snippet</button>
        <button class="ghost" id="copyGuideBtn">Copy full instructions</button>
      </div>
    </div>

    <div class="card">
      <h2>Remember something</h2>
      <div class="row">
        <textarea id="memText" placeholder="A fact to remember…"></textarea>
      </div>
      <div class="row" style="margin-top:10px">
        <input type="text" id="memTags" placeholder="tags (comma-separated, optional)">
        <button id="rememberBtn">Remember</button>
      </div>
    </div>

    <div class="card">
      <h2>Recall</h2>
      <div class="row">
        <input type="text" id="q" placeholder="Search your memories…">
        <button id="searchBtn">Search</button>
      </div>
      <div id="results" style="margin-top:8px"></div>
    </div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
let firstLaunch = false;

async function jget(u){ const r = await fetch(u); return {ok:r.ok, code:r.status, body: await r.json().catch(()=>({}))}; }
async function jpost(u,b){ const r = await fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b||{})}); return {ok:r.ok, code:r.status, body: await r.json().catch(()=>({}))}; }

async function boot(){
  const {body} = await jget('/api/state');
  firstLaunch = body.first_launch;
  if (body.unlocked) return showDash();
  if (firstLaunch){
    $('#lockTitle').textContent = 'Create your password';
    $('#lockHint').innerHTML = '⚠ This password encrypts every memory on the stick. <b>There is NO recovery</b> — if you forget it, your memories are gone forever. You choose the strength.';
    $('#pw').placeholder = 'New password';
    $('#pw2').classList.remove('hidden');
    $('#unlockBtn').textContent = 'Create & start';
  } else {
    $('#lockHint').textContent = 'Enter your password to decrypt your memories.';
  }
}

$('#unlockBtn').onclick = doUnlock;
$('#pw').addEventListener('keydown', e => { if(e.key==='Enter' && !firstLaunch) doUnlock(); });
$('#pw2').addEventListener('keydown', e => { if(e.key==='Enter') doUnlock(); });

async function doUnlock(){
  const pw = $('#pw').value;
  $('#lockErr').textContent = '';
  if (firstLaunch && pw !== $('#pw2').value){ $('#lockErr').textContent = 'Passwords do not match.'; return; }
  if (!pw){ $('#lockErr').textContent = 'Password required.'; return; }
  $('#unlockBtn').disabled = true;
  $('#lockBusy').innerHTML = firstLaunch
    ? '<span class="spin"></span> Setting up — downloading the embedding model (~90 MB, first launch only). This can take a minute…'
    : '<span class="spin"></span> Unlocking & loading model…';
  const {ok, code, body} = await jpost(firstLaunch ? '/api/setup' : '/api/unlock', {password: pw});
  $('#unlockBtn').disabled = false; $('#lockBusy').textContent = '';
  if (ok) { $('#pw').value=''; $('#pw2').value=''; return showDash(); }
  $('#lockErr').textContent = body.error || ('error '+code);
}

async function showDash(){
  $('#lockCard').classList.add('hidden');
  $('#dash').classList.remove('hidden');
  $('#subtitle').textContent = 'unlocked — your memory is live';
  await refresh();
  const sn = await jget('/api/snippet'); $('#snippet').textContent = (sn.body.snippet||'').trim();
}

async function refresh(){
  const {body:h} = await jget('/v1/health');
  $('#memCount').textContent = h.memory_count ?? '–';
  $('#dbSize').textContent = fmtBytes(h.db_size_bytes||0);
  $('#embedder').textContent = (h.embedder||'').replace('local:','');
  $('#warn').textContent = h.flush_error ? ('⚠ persistence error: '+h.flush_error) : '';
}
function fmtBytes(n){ if(n>1e6) return (n/1e6).toFixed(1)+' MB'; if(n>1e3) return (n/1e3|0)+' KB'; return n+' B'; }

$('#copyBtn').onclick = () => { navigator.clipboard.writeText($('#snippet').textContent); $('#copyBtn').textContent='Copied ✓'; setTimeout(()=>$('#copyBtn').textContent='Copy snippet',1500); };
$('#copyGuideBtn').onclick = async () => {
  const r = await fetch('/v1/guide'); const text = await r.text();
  navigator.clipboard.writeText(text); $('#copyGuideBtn').textContent='Copied ✓';
  setTimeout(()=>$('#copyGuideBtn').textContent='Copy full instructions',1500);
};
$('#lockNow').onclick = async () => { await jpost('/api/lock'); location.reload(); };

$('#rememberBtn').onclick = async () => {
  const t = $('#memText').value.trim(); if(!t) return;
  const tags = $('#memTags').value.split(',').map(s=>s.trim()).filter(Boolean);
  const item = {content:t}; if(tags.length) item.tags = tags;
  await jpost('/v1/banks/default/retain', {items:[item]});
  $('#memText').value=''; $('#memTags').value=''; refresh();
};

$('#searchBtn').onclick = doSearch;
$('#q').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });
async function doSearch(){
  const q = $('#q').value.trim(); if(!q) return;
  const {body} = await jpost('/v1/banks/default/recall', {query:q});
  const el = $('#results'); el.innerHTML = '';
  (body.results||[]).forEach(r => {
    const d = document.createElement('div'); d.className='result';
    d.innerHTML = '<div>'+escapeHTML(r.text)+'</div>' + (r.tags? '<div class="tags">'+r.tags.map(escapeHTML).join(', ')+'</div>':'');
    el.appendChild(d);
  });
  if(!(body.results||[]).length) el.innerHTML = '<div class="muted" style="padding:10px 0">No matches.</div>';
}
function escapeHTML(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

boot();
</script>
</body>
</html>
