<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>mykeep — portable memory</title>
<style>
  /* Self-hosted fonts (latin + latin-ext, woff2) — bundled in the binary so the GUI
     renders identically offline, with no call to Google. License: fonts/OFL.txt. */
  @font-face{font-family:'Cinzel';font-style:normal;font-weight:500;font-display:swap;src:url('/fonts/cinzel-500.woff2') format('woff2');}
  @font-face{font-family:'Cinzel';font-style:normal;font-weight:600;font-display:swap;src:url('/fonts/cinzel-600.woff2') format('woff2');}
  @font-face{font-family:'EB Garamond';font-style:normal;font-weight:400;font-display:swap;src:url('/fonts/eb-garamond-400.woff2') format('woff2');}
  @font-face{font-family:'EB Garamond';font-style:normal;font-weight:500;font-display:swap;src:url('/fonts/eb-garamond-500.woff2') format('woff2');}
  @font-face{font-family:'EB Garamond';font-style:italic;font-weight:400;font-display:swap;src:url('/fonts/eb-garamond-400italic.woff2') format('woff2');}
  @font-face{font-family:'Cormorant Garamond';font-style:italic;font-weight:400;font-display:swap;src:url('/fonts/cormorant-garamond-400italic.woff2') format('woff2');}
  :root{
    --bg:#0c2438; --ink:#eee7d7;
    --mist:rgba(238,231,215,.72); --mist2:rgba(238,231,215,.46);
    --panel:rgba(238,231,215,.045); --line:rgba(201,162,75,.30); --line2:rgba(201,162,75,.18);
    --gold:#c9a24b; --gold-bright:#e0c074; --gold-deep:#9c7a32; --err:#e8856b;
    --key:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 16 16'><path d='M0,16 L0,0 L12,0 L12,12 L4,12 L4,4 L8,4 L8,8 L12,8 L12,16 L16,16' fill='none' stroke='black' stroke-width='2'/></svg>");
    color-scheme:dark;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; display:flex; justify-content:center;
    background:
      radial-gradient(120% 70% at 50% -8%, rgba(224,192,116,.10), transparent 55%),
      linear-gradient(180deg,#0e2840,#0c2438 45%,#091d2f);
    background-attachment:fixed; color:var(--ink);
    font:17px/1.62 'EB Garamond',Georgia,serif;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  .wrap{width:100%; max-width:680px; padding:44px 22px 72px;}
  .topbar{display:flex; justify-content:space-between; align-items:flex-start; gap:16px;}
  h1{font-family:'Cinzel',Georgia,serif; font-weight:600; font-size:25px; letter-spacing:.18em; text-transform:uppercase; margin:0; line-height:1; color:var(--ink);}
  h1 .key{background:linear-gradient(180deg,var(--gold-bright),var(--gold) 55%,var(--gold-deep)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;}
  .sub{font-family:'Cormorant Garamond',Georgia,serif; font-style:italic; color:var(--mist); margin:9px 0 0; font-size:15px;}
  .rule{height:14px; margin:20px 0 26px; background:var(--gold); -webkit-mask:var(--key) repeat-x center / 14px 14px; mask:var(--key) repeat-x center / 14px 14px; opacity:.55;}
  .card{position:relative; background:var(--panel); border:1px solid var(--line2); border-radius:4px; padding:22px; margin-bottom:16px;}
  .card h2{font-family:'Cinzel',Georgia,serif; font-size:11.5px; text-transform:uppercase; letter-spacing:.26em; color:var(--gold-bright); font-weight:500; margin:0 0 16px;}
  input[type=password], input[type=text], textarea{width:100%; background:rgba(9,29,47,.6); border:1px solid var(--line); color:var(--ink); border-radius:3px; padding:12px 13px; font:inherit; outline:none; transition:border-color .2s;}
  input::placeholder, textarea::placeholder{color:var(--mist2);}
  input:focus, textarea:focus{border-color:var(--gold);}
  textarea{resize:vertical; min-height:64px;}
  button{font-family:'Cinzel',Georgia,serif; font-size:12.5px; letter-spacing:.1em; text-transform:uppercase; background:linear-gradient(180deg,var(--gold-bright),var(--gold)); color:#1a1300; border:0; border-radius:3px; padding:12px 18px; font-weight:600; cursor:pointer; transition:.18s;}
  button:hover{filter:brightness(1.07); transform:translateY(-1px);}
  button.ghost{background:transparent; color:var(--ink); border:1px solid var(--line);}
  button.ghost:hover{border-color:var(--gold); color:var(--gold-bright); transform:none; filter:none;}
  button:disabled{opacity:.5; cursor:default; transform:none;}
  .row{display:flex; gap:11px; align-items:center;}
  .row > input, .row > textarea{flex:1;}
  .err{color:var(--err); font-size:14px; min-height:18px; margin-top:10px;}
  .muted{color:var(--mist); font-size:14.5px;}
  pre.snippet{white-space:pre-wrap; word-break:break-word; background:rgba(9,29,47,.7); border:1px solid var(--line2); border-radius:3px; padding:15px; font:12.5px/1.6 ui-monospace,SFMono-Regular,Menlo,monospace; margin:0; color:var(--mist);}
  .stat{display:flex; gap:30px; flex-wrap:wrap;}
  .stat div b{font-family:'Cinzel',Georgia,serif; display:block; font-size:22px; color:var(--ink); font-weight:600;}
  .stat div span{color:var(--mist2); font-size:12px; text-transform:uppercase; letter-spacing:.12em;}
  .hidden{display:none;}
  .result{border-top:1px solid var(--line2); padding:12px 0;}
  .result:first-child{border-top:0;}
  .result .tags{color:var(--gold-bright); font-size:13px; margin-top:3px; font-style:italic;}
  .pill{font-family:'Cinzel',Georgia,serif; font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--gold-bright); border:1px solid var(--line); background:rgba(201,162,75,.08); padding:5px 11px; border-radius:999px; white-space:nowrap;}
  .spin{display:inline-block; width:13px; height:13px; border:2px solid rgba(238,231,215,.25); border-top-color:var(--gold-bright); border-radius:50%; animation:s .7s linear infinite; vertical-align:-2px;}
  @keyframes s{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <h1>my<span class="key">keep</span></h1>
      <p class="sub" id="subtitle">portable, encrypted memory for your AI agent</p>
    </div>
    <span class="pill" id="encpill">🔒 encrypted</span>
  </div>

  <div class="rule"></div>

  <!-- LOCK / SETUP -->
  <div class="card" id="lockCard">
    <h2 id="lockTitle">Unlock</h2>
    <p class="muted" id="lockHint"></p>
    <div style="margin:6px 0 0">
      <input type="password" id="pw" placeholder="Decryption password" autofocus>
      <input type="password" id="pw2" class="hidden" placeholder="Confirm password" style="margin-top:10px">
    </div>
    <div class="row" style="margin-top:12px">
      <button id="unlockBtn">Unlock</button>
      <span class="muted" id="lockBusy"></span>
    </div>
    <div class="err" id="lockErr"></div>
  </div>

  <!-- DASHBOARD -->
  <div id="dash" class="hidden">
    <div class="card">
      <h2>Status</h2>
      <div class="stat">
        <div><b id="memCount">–</b><span>memories</span></div>
        <div><b id="dbSize">–</b><span>on disk</span></div>
        <div><b id="embedder" style="font-size:14px">–</b><span>embedder</span></div>
      </div>
      <div class="row" style="margin-top:16px">
        <button class="ghost" id="lockNow">Lock</button>
        <span class="muted" id="warn"></span>
      </div>
    </div>

    <div class="card">
      <h2>Connect your AI assistant</h2>
      <p class="muted" style="margin:-6px 0 12px">Paste this into Claude Code, Cursor, or any agent with a shell/fetch tool.</p>
      <pre class="snippet" id="snippet">…</pre>
      <div class="row" style="margin-top:12px">
        <button class="ghost" id="copyBtn">Copy snippet</button>
        <button class="ghost" id="copyGuideBtn">Copy full instructions</button>
      </div>
    </div>

    <div class="card">
      <h2>Remember something</h2>
      <div class="row">
        <textarea id="memText" placeholder="A fact to remember…"></textarea>
      </div>
      <div class="row" style="margin-top:10px">
        <input type="text" id="memTags" placeholder="tags (comma-separated, optional)">
        <button id="rememberBtn">Remember</button>
      </div>
    </div>

    <div class="card">
      <h2>Recall</h2>
      <div class="row">
        <input type="text" id="q" placeholder="Search your memories…">
        <button id="searchBtn">Search</button>
      </div>
      <div id="results" style="margin-top:8px"></div>
    </div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
let firstLaunch = false;

async function jget(u){ const r = await fetch(u); return {ok:r.ok, code:r.status, body: await r.json().catch(()=>({}))}; }
async function jpost(u,b){ const r = await fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b||{})}); return {ok:r.ok, code:r.status, body: await r.json().catch(()=>({}))}; }

async function boot(){
  const {body} = await jget('/api/state');
  firstLaunch = body.first_launch;
  if (body.unlocked) return showDash();
  if (firstLaunch){
    $('#lockTitle').textContent = 'Create your password';
    $('#lockHint').innerHTML = '⚠ This password encrypts every memory on the stick. <b>There is NO recovery</b> — if you forget it, your memories are gone forever. You choose the strength.';
    $('#pw').placeholder = 'New password';
    $('#pw2').classList.remove('hidden');
    $('#unlockBtn').textContent = 'Create & start';
  } else {
    $('#lockHint').textContent = 'Enter your password to decrypt your memories.';
  }
}

$('#unlockBtn').onclick = doUnlock;
$('#pw').addEventListener('keydown', e => { if(e.key==='Enter' && !firstLaunch) doUnlock(); });
$('#pw2').addEventListener('keydown', e => { if(e.key==='Enter') doUnlock(); });

async function doUnlock(){
  const pw = $('#pw').value;
  $('#lockErr').textContent = '';
  if (firstLaunch && pw !== $('#pw2').value){ $('#lockErr').textContent = 'Passwords do not match.'; return; }
  if (!pw){ $('#lockErr').textContent = 'Password required.'; return; }
  $('#unlockBtn').disabled = true;
  $('#lockBusy').innerHTML = firstLaunch
    ? '<span class="spin"></span> Setting up — downloading the embedding model (~90 MB, first launch only). This can take a minute…'
    : '<span class="spin"></span> Unlocking & loading model…';
  const {ok, code, body} = await jpost(firstLaunch ? '/api/setup' : '/api/unlock', {password: pw});
  $('#unlockBtn').disabled = false; $('#lockBusy').textContent = '';
  if (ok) { $('#pw').value=''; $('#pw2').value=''; return showDash(); }
  $('#lockErr').textContent = body.error || ('error '+code);
}

async function showDash(){
  $('#lockCard').classList.add('hidden');
  $('#dash').classList.remove('hidden');
  $('#subtitle').textContent = 'unlocked — your memory is live';
  await refresh();
  const sn = await jget('/api/snippet'); $('#snippet').textContent = (sn.body.snippet||'').trim();
}

async function refresh(){
  const {body:h} = await jget('/v1/health');
  $('#memCount').textContent = h.memory_count ?? '–';
  $('#dbSize').textContent = fmtBytes(h.db_size_bytes||0);
  $('#embedder').textContent = (h.embedder||'').replace('local:','');
  $('#warn').textContent = h.flush_error ? ('⚠ persistence error: '+h.flush_error) : '';
}
function fmtBytes(n){ if(n>1e6) return (n/1e6).toFixed(1)+' MB'; if(n>1e3) return (n/1e3|0)+' KB'; return n+' B'; }

$('#copyBtn').onclick = () => { navigator.clipboard.writeText($('#snippet').textContent); $('#copyBtn').textContent='Copied ✓'; setTimeout(()=>$('#copyBtn').textContent='Copy snippet',1500); };
$('#copyGuideBtn').onclick = async () => {
  const r = await fetch('/v1/guide'); const text = await r.text();
  navigator.clipboard.writeText(text); $('#copyGuideBtn').textContent='Copied ✓';
  setTimeout(()=>$('#copyGuideBtn').textContent='Copy full instructions',1500);
};
$('#lockNow').onclick = async () => { await jpost('/api/lock'); location.reload(); };

$('#rememberBtn').onclick = async () => {
  const t = $('#memText').value.trim(); if(!t) return;
  const tags = $('#memTags').value.split(',').map(s=>s.trim()).filter(Boolean);
  const item = {content:t}; if(tags.length) item.tags = tags;
  await jpost('/v1/banks/default/retain', {items:[item]});
  $('#memText').value=''; $('#memTags').value=''; refresh();
};

$('#searchBtn').onclick = doSearch;
$('#q').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });
async function doSearch(){
  const q = $('#q').value.trim(); if(!q) return;
  const {body} = await jpost('/v1/banks/default/recall', {query:q});
  const el = $('#results'); el.innerHTML = '';
  (body.results||[]).forEach(r => {
    const d = document.createElement('div'); d.className='result';
    d.innerHTML = '<div>'+escapeHTML(r.text)+'</div>' + (r.tags? '<div class="tags">'+r.tags.map(escapeHTML).join(', ')+'</div>':'');
    el.appendChild(d);
  });
  if(!(body.results||[]).length) el.innerHTML = '<div class="muted" style="padding:10px 0">No matches.</div>';
}
function escapeHTML(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

boot();
</script>
</body>
</html>
